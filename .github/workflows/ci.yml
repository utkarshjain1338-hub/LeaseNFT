name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    uses: ./.github/workflows/contract.yml

  frontend:
    uses: ./.github/workflows/frontend.yml

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [contract, frontend]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ needs.contract.result }}" != "success" ]]; then
            echo "Contract CI failed"
            exit 1
          fi
          if [[ "${{ needs.frontend.result }}" != "success" ]]; then
            echo "Frontend CI failed"
            exit 1
          fi
          echo "All checks passed!"
